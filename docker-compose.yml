# 敏感变量通过 .env.docker 注入（由 Makefile 从 .env.docker.example 生成）。
# 解析插值：docker compose --env-file .env.docker …
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-texpad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.docker (copy from .env.docker.example)}
      POSTGRES_DB: ${POSTGRES_DB:-texpad}
    ports:
      - "25432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-texpad} -d ${POSTGRES_DB:-texpad}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 勿回退到过旧 tag：旧二进制无法读取由较新 MinIO 写入的卷（会报 Unknown xl meta version 3）
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env.docker}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 一键本地栈：make run-docker（Postgres / Redis / MinIO + 后端 + Nginx 前端）
  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: deploy/backend/Dockerfile
    environment:
      TEXPAD_HTTP_ADDR: ":8080"
      TEXPAD_DATABASE_URL: postgres://${POSTGRES_USER:-texpad}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-texpad}?sslmode=disable
      TEXPAD_REDIS_ADDR: redis:6379
      TEXPAD_MINIO_ENDPOINT: minio:9000
      TEXPAD_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      TEXPAD_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TEXPAD_MINIO_BUCKET: texpad
      TEXPAD_MINIO_USE_SSL: "false"
      TEXPAD_JWT_SECRET: ${TEXPAD_JWT_SECRET:?Set TEXPAD_JWT_SECRET in .env.docker}
      TEXPAD_CORS_ORIGINS: ${TEXPAD_CORS_ORIGINS:?Set TEXPAD_CORS_ORIGINS in .env.docker}
      TEXPAD_REQUIRE_COMPILE_VOLUME: ${TEXPAD_REQUIRE_COMPILE_VOLUME:-true}
      # 使用宿主 Docker + texpad-texlive:2025（TeX Live full），避免容器内 Debian 精简 TeX 缺宏包
      TEXPAD_COMPILE_NATIVE: "false"
      TEXPAD_TEXLIVE_IMAGE: texpad-texlive:2025
      TEXPAD_TEXLIVE_IMAGE_2025: texpad-texlive:2025
      TEXPAD_TEXLIVE_IMAGE_2024: texpad-texlive:2024
      TEXPAD_DOCKER_BIN: /usr/bin/docker
      # 与下方命名卷一致：宿主 docker run 挂载的是「卷」而非容器内 /tmp，否则读不到 build.log
      TEXPAD_COMPILE_DOCKER_VOLUME: texpad_compile_workspace
      TEXPAD_COMPILE_WORKSPACE_DIR: /compile-work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - texpad_compile_workspace:/compile-work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
    ports:
      - "18472:80"
    depends_on:
      backend:
        condition: service_healthy

  # TeX Live「full」方案（huge）；后端通过 `docker run` 使用
  texlive2025:
    build:
      context: ./deploy/texlive
      dockerfile: Dockerfile
      args:
        TEX_SCHEME: latest-full
    image: texpad-texlive:2025
    profiles:
      - compile
    command: ["sleep", "infinity"]
    volumes:
      - texwork:/work

  texlive2024:
    build:
      context: ./deploy/texlive
      dockerfile: Dockerfile
      args:
        TEX_SCHEME: TL2024-historic
    image: texpad-texlive:2024
    profiles:
      - compile
    command: ["sleep", "infinity"]
    volumes:
      - texwork:/work

  # CI / 快速反馈：scheme medium（体积小，宏包少于 full；缺包时请用 profile compile 构建 full）
  texlive2025-slim:
    build:
      context: ./deploy/texlive
      dockerfile: Dockerfile.slim
      args:
        TEX_SCHEME: latest-medium
    image: texpad-texlive:2025-slim
    profiles:
      - compile-slim
    command: ["sleep", "infinity"]
    volumes:
      - texwork_slim:/work

  collab:
    build:
      context: ./services/collab
      dockerfile: Dockerfile
    ports:
      - "18475:18475"
    environment:
      HOST: "0.0.0.0"
      PORT: "18475"
      TEXPAD_JWT_SECRET: ${TEXPAD_JWT_SECRET:?Set TEXPAD_JWT_SECRET in .env.docker}
      TEXPAD_API_URL: http://backend:8080
    profiles:
      - collab

volumes:
  pgdata:
  miniodata:
  texwork:
  texwork_slim:
  texpad_compile_workspace:
    name: texpad_compile_workspace
